<!DOCTYPE html>
<html>  <head>
    <title>Title of the document</title>
    <style>
      .modal_Customize {
        display: none;
        position: fixed;
        z-index: 8;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        overflow: auto;
        background-color: rgb(0, 0, 0);
        background-color: rgba(0, 0, 0, 0.4);
      }
      .modal_content_customize {
        margin: 50px auto;
        border: 1px solid #999;
        width: 60%;
      }

      .button_customize{
      	cursor: pointer;
		color: white;
		background: #7c8ba1;
		font-weight: bold;
		padding: auto;
		width: 120px;
		height: 40px;
		text-transform: uppercase;
		border-radius: 24px;
		border: none;
      }
 		

	   .button_customize:hover,
       .button_customize:focus
			{
			transition: 0.5s;
			background:red;
		}

    	.customize-form form
    	{
        padding: 25px;
        margin: 25px;
        box-shadow: 0 2px 5px #f5f5f5;
        background: #eee;
     	 }
      	.close_customize:hover,
      	.close_customize:focus 
      	{

        color: black;
        text-decoration: none;
        cursor: pointer;

     	}
    
    </style>
  </head>
  <body>
    <p>
      <button  class="button_customize" data-modal="modalOne" >Customize</button>
    </p>

    <div id="modalOne" class="modal_Customize">
      <div class="modal_content_customize">
        <div class="customize-form">
          <a class="close_customize">&times;</a>
          <form action="/">
            <p>design your form hear</p>
          </form>
        </div>
      </div>
    </div>
  
    <script>
      let modalBtns = [...document.querySelectorAll(".button_customize")];
      modalBtns.forEach(function(btn) {
        btn.onclick = function() {
          let modal = btn.getAttribute('data-modal');
          document.getElementById(modal)
            .style.display = "block";
        }
      });
      let closeBtns = [...document.querySelectorAll(".close_customize")];
      closeBtns.forEach(function(btn) {
        btn.onclick = function() {
          let modal = btn.closest('.modal_Customize');
          modal.style.display = "none";
        }
      });
      window.onclick = function(event) {
        if(event.target.className === ".modal_Customize") {
          event.target.style.display = "none";
        }
      }
    </script>
  </body>
</html>
